// ── Storage: localStorage with optional Firebase sync ──
const STORE_KEY = "perf_tracker_v1";

function loadAll() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

function saveAll(data) {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify(data));
  } catch(e) {}
  // Optional Firebase sync - fires silently in background
  syncToFirebase(data);
}

function get(key, fallback) {
  const store = loadAll();
  return store[key] !== undefined ? store[key] : fallback;
}

function set(key, value) {
  const store = loadAll();
  store[key] = value;
  saveAll(store);
}

const FB_PROJECT = "performance-optimizer-52a6d";
const FB_API_KEY = "AIzaSyCnvobrSAgTjBMlHlIZVe7Yf2ScIYY2osA";
let fbUserId = localStorage.getItem("perf_fb_uid") || null;

async function syncToFirebase(data) {
  try {
    if (!fbUserId) {
      const r = await fetch("https://identitytoolkit.googleapis.com/v1/accounts:signUp?key="+FB_API_KEY,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({returnSecureToken:true})
      });
      const j = await r.json();
      if (j.localId) { fbUserId = j.localId; localStorage.setItem("perf_fb_uid", fbUserId); }
    }
    if (!fbUserId) return;
    await fetch("https://firestore.googleapis.com/v1/projects/"+FB_PROJECT+"/databases/(default)/documents/users/"+fbUserId,{
      method:"PATCH",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({fields:{payload:{stringValue:JSON.stringify(data)}}})
    });
  } catch(e) {} // silent fail - localStorage is the source of truth
}

async function loadFromFirebase() {
  try {
    if (!fbUserId) return null;
    const r = await fetch("https://firestore.googleapis.com/v1/projects/"+FB_PROJECT+"/databases/(default)/documents/users/"+fbUserId);
    const j = await r.json();
    if (j.fields && j.fields.payload) return JSON.parse(j.fields.payload.stringValue);
    return null;
  } catch(e) { return null; }
}

              <div style={{fontSize:12,fontWeight:700,color:"#8B949E",marginBottom:8}}>+ Add your own habit</div>
              <div style={{display:"flex",gap:7}}>
                <input value={newHabit} onChange={e=>setNewHabit(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addHabit()} placeholder="e.g. No sugar after 8pm" style={{flex:1,padding:"9px 11px",borderRadius:7,border:"1px solid #30363D",background:"#0D1117",color:"#E6EDF3",fontSize:13,outline:"none"}} />
                <button onClick={addHabit} style={{padding:"9px 14px",borderRadius:7,border:"none",background:T,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>Add</button>
              </div>
            </div>
          </div>
        )}

        {/* STATS */}
        {view==="stats"&&(
          <div>
            <div style={{fontSize:12,color:"#8B949E",marginBottom:12}}>Log an entry at end of each day or week. Graph builds over time.</div>
            <div style={{padding:13,borderRadius:10,background:"#161B22",border:"1px solid #21262D",marginBottom:16}}>
              <div style={{fontSize:13,fontWeight:700,color:T,marginBottom:12}}>Week {weekIdx+1}, {day.day} - Self-Assessment</div>
              {METRICS.map(({key,label})=>(
                <div key={key} style={{marginBottom:13}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{fontSize:12,color:"#C9D1D9"}}>{label}</span>
                    <span style={{fontSize:12,fontWeight:700,color:T}}>{curAssess[key]}/10</span>
                  </div>
                  <input type="range" min={1} max={10} value={curAssess[key]} onChange={e=>setCurAssess({...curAssess,[key]:Number(e.target.value)})} style={{width:"100%",accentColor:T}} />
                </div>
              ))}
              <button onClick={saveAssessment} disabled={saving} style={{width:"100%",padding:"11px",borderRadius:9,border:"none",cursor:saving?"not-allowed":"pointer",background:saving?"#30363D":T,color:"#fff",fontWeight:700,fontSize:13}}>{saving?"Saved!":"Save Entry"}</button>
            </div>
            {chartData.length>1&&(
              <div style={{padding:13,borderRadius:10,background:"#161B22",border:"1px solid #21262D",marginBottom:16}}>
                <div style={{fontSize:11,fontWeight:700,color:"#8B949E",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Progress Over Time</div>
                <ResponsiveContainer width="100%" height={220}>
                  <LineChart data={chartData}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#21262D" />
                    <XAxis dataKey="name" stroke="#8B949E" tick={{fontSize:10}} />
                    <YAxis domain={[0,10]} stroke="#8B949E" tick={{fontSize:10}} />
                    <Tooltip contentStyle={{background:"#161B22",border:"1px solid #21262D",borderRadius:8,fontSize:11}} />
                    <Legend wrapperStyle={{fontSize:10}} />
                    <Line type="monotone" dataKey="Erection" stroke="#52B788" strokeWidth={2} dot={{r:2}} />
                    <Line type="monotone" dataKey="Libido" stroke="#F4A261" strokeWidth={2} dot={{r:2}} />
                    <Line type="monotone" dataKey="Energy" stroke="#E76F51" strokeWidth={2} dot={{r:2}} />
                    <Line type="monotone" dataKey="Recovery" stroke="#2A9D8F" strokeWidth={2} dot={{r:2}} />
                    <Line type="monotone" dataKey="Morning" stroke="#A78BFA" strokeWidth={2} dot={{r:2}} />
                    <Line type="monotone" dataKey="Avg" stroke="#E6EDF3" strokeWidth={3} strokeDasharray="4 2" dot={{r:2}} />
                  </LineChart>
                </ResponsiveContainer>
              </div>
            )}
            {assessments.length>0?(
              <div>
                <div style={{fontSize:11,fontWeight:700,color:"#8B949E",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Entry History</div>
                {assessments.slice().reverse().map((a,i)=>(
                  <div key={i} style={{padding:"11px 13px",borderRadius:10,background:"#161B22",border:"1px solid #21262D",marginBottom:7}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                      <span style={{fontSize:12,fontWeight:700,color:WEEKS[a.week-1]?.theme||T}}>Week {a.week}, Day {a.day}</span>
                      <span style={{fontSize:11,color:"#8B949E"}}>{a.date}</span>
                    </div>
                    <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                      {METRICS.map(({key,label})=>(
                        <div key={key} style={{background:"#21262D",borderRadius:5,padding:"3px 6px",fontSize:10}}>
                          <span style={{color:"#8B949E"}}>{label}: </span>
                          <span style={{color:"#E6EDF3",fontWeight:700}}>{a[key]}</span>
                        </div>
                      ))}
                      <div style={{background:(WEEKS[a.week-1]?.theme||T)+"33",borderRadius:5,padding:"3px 6px",fontSize:10}}>
                        <span style={{color:"#8B949E"}}>Avg: </span>
                        <span style={{color:WEEKS[a.week-1]?.theme||T,fontWeight:700}}>{avgScore(a)}</span>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            ):(
              <div style={{textAlign:"center",padding:"24px 14px",color:"#8B949E",fontSize:12}}>Save your first entry above. Graph appears after 2 entries.</div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
