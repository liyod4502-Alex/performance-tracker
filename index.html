<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Performance" />
  <title>Performance Optimizer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0D1117; color: #E6EDF3; font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; }
    input[type=range] { width: 100%; }
    button { font-family: inherit; }
    input[type=text] { font-family: inherit; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0D1117; }
    ::-webkit-scrollbar-thumb { background: #30363D; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Firebase SDKs -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // ── PASTE YOUR FIREBASE CONFIG HERE ──
    const firebaseConfig = {
  apiKey: "AIzaSyCnvobrSAgTjBMlHlIZVe7Yf2ScIYY2osA",
  authDomain: "performance-optimizer-52a6d.firebaseapp.com",
  projectId: "performance-optimizer-52a6d",
  storageBucket: "performance-optimizer-52a6d.firebasestorage.app",
  messagingSenderId: "266713462274",
  appId: "1:266713462274:web:48eb286d7b2a5add17191b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // Expose to window so React app can use it
    window.__db = db;
    window.__auth = auth;
    window.__firestore = { doc, setDoc, getDoc, collection, getDocs };
    window.__signInAnonymously = signInAnonymously;
    window.__onAuthStateChanged = onAuthStateChanged;
    window.__firebaseReady = true;

    // Dispatch event so React knows Firebase is ready
    window.dispatchEvent(new Event("firebaseReady"));
  </script>

  <!-- React + Recharts via CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="app.jsx" type="text/babel"></script>
</body>
</html>
