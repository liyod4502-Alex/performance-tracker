// ── DATE HELPERS ──
function localDateStr(d){var yr=d.getFullYear(),mo=String(d.getMonth()+1).padStart(2,"0"),dy=String(d.getDate()).padStart(2,"0");return yr+"-"+mo+"-"+dy;}
function todayStr(){return localDateStr(new Date());}
function dateStr(d){return localDateStr(d);}
// Get day index 0=Mon..6=Sun from a date string
function getDayIdx(ds){const d=new Date(ds);return(d.getDay()+6)%7;}
function isSunday(ds){var p=ds.split("-").map(Number);return new Date(p[0],p[1]-1,p[2]).getDay()===0;}

// ── CYCLE / WEEK LOGIC ──
// Each "week" in the program is Mon-Sun
// We track a cycleStart date (first Monday of the program)
// From any date we can compute which program week (1-4) and which day
function getCycleStart(){
  let cs=getLocal("cycleStart",null);
  if(!cs){
    // Default to most recent Monday
    const now=new Date();
    const day=now.getDay();
    const diff=day===0?-6:1-day;
    const mon=new Date(now);mon.setDate(now.getDate()+diff);
    cs=dateStr(mon);saveLocal("cycleStart",cs);
  }
  return cs;
}
function resetCycle(){
  const now=new Date();
  const day=now.getDay();
  const diff=day===0?-6:1-day;
  const mon=new Date(now);mon.setDate(now.getDate()+diff);
  const cs=dateStr(mon);
  persist("cycleStart",cs);
  return cs;
}
function getProgramWeekForDate(ds){
  const cs=getCycleStart();
  const start=new Date(cs);
  const target=new Date(ds);
  const diffDays=Math.floor((target-start)/(1000*60*60*24));
  if(diffDays<0)return{week:0,day:0};
  const programDay=diffDays%28; // 4 weeks * 7 days = 28 day cycle, then loops
  const week=Math.floor(programDay/7);
  const day=programDay%7;
  return{week,day};
}

// Get item from pool for given week+day, deterministically rotating
function poolItem(poolArr,weekIdx,dayIdx,slot){
  if(!poolArr||!poolArr.length)return{n:"Rest",note:""};
  const idx=(weekIdx*7+dayIdx+slot*3)%poolArr.length;
  return poolArr[idx];
}

// Exercise: one per day, from week pool
function getExercise(weekIdx,dayIdx){
  const wp=pools.exercise?pools.exercise[weekIdx]:[];
  if(!wp||!wp.length)return{n:"Rest",note:""};
  // Sunday (dayIdx 6) always rest
  if(dayIdx===6)return wp.find(e=>e.n.startsWith("REST"))||{n:"Rest - full recovery",note:""};
  return wp[dayIdx]||{n:"Rest",note:""};
}

// Vitamins: 2 per day rotating from week pool

  const wp=pools.vitamins?pools.vitamins[weekIdx]:[];

  const i2=(weekIdx*7+dayIdx+1)%wp.length;
  return[wp[i1],wp[i2===i1?(i2+1)%wp.length:i2]];
}

// Get 1 habit per category for a given date, rotating
function getDayHabits(ds){
  // Use LOCAL date num to avoid timezone drift
  var p=ds.split("-").map(Number);
  var dayNum=Math.floor(new Date(p[0],p[1]-1,p[2]).getTime()/(1000*60*60*24));
  const result=[];
  HAB_CATS.forEach(cat=>{
    const catHabits=habits[cat]||[];
    if(!catHabits.length)return;
    if(isSunday(ds)){
      // Sunday: Spiritual + Sleep/Meditation + Trading Sunday Review
      if(cat==="Spiritual"||cat==="Sleep / Meditation"){
        const idx=dayNum%catHabits.length;
        result.push({...catHabits[idx],cat});
      }else if(cat==="Trading"){
        // Always show Sunday ICT review on Sundays
        const sundayHabit=catHabits.find(function(h){return h.id==="tr3"||h.name.toLowerCase().includes("sunday");});
        if(sundayHabit) result.push({...sundayHabit,cat});
      }
    }else{
      // Rotate DAILY within category
      const idx=dayNum%catHabits.length;
      result.push({...catHabits[idx],cat});
    }
  });
  return result;
}

// ── SCORING ──
function getSections(ds){
  const{week,day}=getProgramWeekForDate(ds);
  const ex=getExercise(week,day);
  const vits=getVitamins(week,day);
  const foods=isSunday(ds)?[]:getFoods(week,day);
  const secs=[];
  if(!isSunday(ds)){
    secs.push({key:"exercise",title:"Exercise",items:[ex]});
    secs.push({key:"vitamins",title:"Vitamins / Supplements",items:vits});
    secs.push({key:"foods",title:"Performance Foods",items:foods});
  }else{
    secs.push({key:"exercise",title:"Exercise (Rest Day)",items:[ex]});
  }
  return secs;
}

function computeScore(ds){
  const secs=getSections(ds);
  const dayH=getDayHabits(ds);
  let tot=0,dn=0;
  secs.forEach((sec,si)=>sec.items.forEach((_,ii)=>{
    tot++;if(checks[ds+"-"+si+"-"+ii])dn++;
  }));
  dayH.forEach(h=>{tot++;if(hChecks[h.id+"-"+ds])dn++;});
  return tot?Math.round(dn/tot*100):0;
}

function computeCatScores(ds){
  const scores={};
  HAB_CATS.forEach(cat=>{
    const catH=(habits[cat]||[]);
    const dayH=getDayHabits(ds).filter(h=>h.cat===cat);
    let tot=dayH.length,dn=0;
    dayH.forEach(h=>{if(hChecks[h.id+"-"+ds])dn++;});
    scores[cat]=tot?Math.round(dn/tot*100):0;
  });
  return scores;
}

function saveScore(){
  const score=computeScore(selectedDate);

  const{week,day}=getProgramWeekForDate(selectedDate);

}

// ── WEEKLY SUMMARY (Sunday) ──
function getWeeklySummary(){
  const today=todayStr();
  const todayDate=new Date();
  // Get Mon-Sat of this week
  const dayOfWeek=todayDate.getDay(); // 0=Sun
  const weekDates=[];
  for(let i=1;i<=6;i++){
    const d=new Date(todayDate);
    d.setDate(todayDate.getDate()-(dayOfWeek===0?7-i:dayOfWeek-i));
    weekDates.push(dateStr(d));
  }
  // Scores for the week
  const scores=weekDates.map(d=>dailyScores[d]?.score).filter(s=>s!==undefined);
  if(!scores.length)return null;
  const avg=Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
  const best=Math.max(...scores);
  const bestDay=weekDates[scores.indexOf(best)];
  const bestDayName=new Date(bestDay+"T12:00:00").toLocaleDateString("en-US",{weekday:"long"});
  // Weakest category this week
  const catTotals={};
  HAB_CATS.forEach(cat=>{
    const vals=weekDates.map(d=>dailyScores[d]?.cats?.[cat]).filter(v=>v!==undefined);
    catTotals[cat]=vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):0;
  });
  const weakCat=HAB_CATS.reduce((a,b)=>catTotals[a]<=catTotals[b]?a:b);
  const weakPct=catTotals[weakCat];
  // Tips per weak category
  const tips={
    Spiritual:"Schedule your prayer time like a non-negotiable appointment — same time every day.",
    Trading:"Review your ICT bias every Sunday evening. Preparation is the edge.",
    Longevity:"Stack your walk with another habit — shoes on right after your first meal.",
    Sleep:"Set a hard 9:30pm phone alarm. One consistent bedtime changes everything.",
  };
  return{avg,best,bestDayName,weakCat,weakPct,tip:tips[weakCat]||"Stay consistent — small daily wins compound."};
}

// ── ACTIONS ──
function setView(v){view=v;if(v==="stats"){saveScore();}render();}
function setW(weekIdx){
  // Navigate to a specific program week - find the Monday of that week in the cycle
  var cs=getCycleStart();
  var cycleMonday=new Date(cs.split("-")[0],parseInt(cs.split("-")[1])-1,parseInt(cs.split("-")[2]));
  var targetDate=new Date(cycleMonday);
  targetDate.setDate(cycleMonday.getDate()+(weekIdx*7));
  selectedDate=dateStr(targetDate);
  render();
}
function setD(dayIdx){
  // Navigate to a specific day in the current week
  var cur=getProgramWeekForDate(selectedDate);
  var cs=getCycleStart();
  var cycleMonday=new Date(cs.split("-")[0],parseInt(cs.split("-")[1])-1,parseInt(cs.split("-")[2]));
  var weekStart=new Date(cycleMonday);
  weekStart.setDate(cycleMonday.getDate()+(cur.week*7));
  var targetDate=new Date(weekStart);
  targetDate.setDate(weekStart.getDate()+dayIdx);
  selectedDate=dateStr(targetDate);
  render();
}
function setHF(c){hFilter=c;render();}

    hpHtml+="<div style='display:flex;gap:6px;flex-shrink:0;margin-left:8px'>";
    hpHtml+="<button onclick='editHabitInPool("+i+")' style='padding:4px 8px;border-radius:5px;border:1px solid #30363D;background:transparent;color:#8B949E;font-size:11px'>Edit</button>";
    hpHtml+="<button onclick='removeHabitFromPool("+i+")' style='padding:4px 8px;border-radius:5px;border:1px solid #E76F5144;background:transparent;color:#E76F51;font-size:11px'>&#10005;</button></div></div>";
    hpHtml+="<div id='hpEdit_"+i+"' style='display:none;margin-top:8px;border-top:1px solid #21262D;padding-top:8px'>";
    hpHtml+="<input id='hpName_"+i+"' value='"+h.name.replace(/'/g,"&#39;")+"' placeholder='Habit name' style='width:100%;padding:7px 9px;border-radius:6px;border:1px solid #30363D;background:#0D1117;color:#E6EDF3;font-size:12px;outline:none;margin-bottom:6px'/>";
    hpHtml+="<input id='hpCue_"+i+"' value='"+(h.cue||"").replace(/'/g,"&#39;")+"' placeholder='Cue (what triggers this)' style='width:100%;padding:7px 9px;border-radius:6px;border:1px solid #30363D;background:#0D1117;color:#E6EDF3;font-size:12px;outline:none;margin-bottom:6px'/>";
    hpHtml+="<input id='hpTip_"+i+"' value='"+(h.tip||"").replace(/'/g,"&#39;")+"' placeholder='2-min rule (smallest action)' style='width:100%;padding:7px 9px;border-radius:6px;border:1px solid #30363D;background:#0D1117;color:#E6EDF3;font-size:12px;outline:none;margin-bottom:6px'/>";
    hpHtml+="<div style='display:flex;gap:6px'>";
    hpHtml+="<button onclick='saveHabitInPool("+i+")' style='flex:1;padding:7px;border-radius:6px;background:var(--T);color:#fff;font-size:12px;font-weight:600'>Save</button>";
    hpHtml+="<button onclick='cancelHabitEdit("+i+")' style='flex:1;padding:7px;border-radius:6px;background:#21262D;color:#8B949E;font-size:12px'>Cancel</button></div></div></div>";
  });
  document.getElementById("poolList").innerHTML=hpHtml;
  document.getElementById("poolModal").style.display="flex";
  // Override add button to add habit
  _poolMode="habit"; // route Add button to habit handler
}
function addHabitFromPool(){
  var cat=_habitPoolCat;
  var name=document.getElementById("poolNewName").value.trim();
  if(!name)return;
  var cue=document.getElementById("poolNewNote").value.trim();
  var tip=document.getElementById("poolNewTip")?document.getElementById("poolNewTip").value.trim():"";
  if(!habits[cat])habits[cat]=[];
  habits[cat].push({id:"h"+Date.now(),name:name,cue:cue,tip:tip});
  persist("habits",habits);
  document.getElementById("poolNewName").value="";
  document.getElementById("poolNewNote").value="";
  document.getElementById("poolNewTip").value="";
  openHabitPoolModal(cat);
}
function removeHabitFromPool(idx){
  var cat=_habitPoolCat;
  if(!habits[cat])return;
  habits[cat].splice(idx,1);
  persist("habits",habits);
  openHabitPoolModal(cat);
}
function editHabitInPool(i){
  var el=document.getElementById("hpEdit_"+i);
  if(el)el.style.display=el.style.display==="none"?"block":"none";
}
function cancelHabitEdit(i){
  var el=document.getElementById("hpEdit_"+i);
  if(el)el.style.display="none";
}
function saveHabitInPool(i){
  var cat=_habitPoolCat;
  var n=document.getElementById("hpName_"+i);
  var c=document.getElementById("hpCue_"+i);
  var t=document.getElementById("hpTip_"+i);
  if(!n||!n.value.trim())return;
  if(!habits[cat])return;
  habits[cat][i]={...habits[cat][i],name:n.value.trim(),cue:c?c.value.trim():"",tip:t?t.value.trim():""};
  persist("habits",habits);
  openHabitPoolModal(cat);
}
function toggleCheck(k){checks[k]=!checks[k];persist("checks",checks);saveScore();render();}
function toggleHabit(id,ds){const k=id+"-"+ds;hChecks[k]=!hChecks[k];persist("hChecks",hChecks);saveScore();render();}
function toggleExp(id){expandedH=expandedH===id?null:id;render();}
function resetAndRender(){resetCycle();render();}

// ── BOOT ──
initPools();
initHabits();
loadState();
</script>
</body>
</html>
